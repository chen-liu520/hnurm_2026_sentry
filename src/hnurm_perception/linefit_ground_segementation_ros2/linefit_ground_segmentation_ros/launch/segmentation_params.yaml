ground_segmentation:
  ros__parameters:
    n_threads: 12               # number of threads to use.

    r_min: 0.5               # minimum point distance.
    r_max: 10                  # maximum point distance.
    n_bins: 240                 # number of radial bins.m -r l  

    max_dist_to_line: 0.2   # maximum vertical distance of point to line to be considered ground.

    sensor_height: 0.4       # sensor height above ground.
    min_slope: -0.75             # minimum slope of a ground line.
    max_slope: 0.75          # maximum slope of a ground line.
    max_fit_error: 0.5   
          # maximum error of a point during line fit.4
    long_threshold: 1.0         # distance between points after which they are considered far from each other.
    max_long_height: 0.1        # maximum height change to previous point in long line.
    max_start_height: 0.2       # maximum difference to estimated ground height to start a new line.
    line_search_angle: 0.55     # how far to search in angular direction to find a line [rad].

    gravity_aligned_frame: ""   # Frame which has its z axis aligned with gravity. (Sensor frame if empty.)

    latch: false                # latch output topics or not
    visualize: false            # visualize segmentation result - USE ONLY FOR DEBUGGING

    input_topic: "/cloud_registered"    #/livox/lidar/p
    obstacle_output_topic: "segmentation/obstacle"
    ground_output_topic: "segmentation/ground"