controller_server:
  ros__parameters:
    odom_topic: /Odometry_transformed
    use_sim_time: False
    controller_frequency: 100.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath", "FollowPathDWB"] # 建议主要使用 MPPI (FollowPath)
    enable_stamped_cmd_vel: true

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.1 # 舵轮可能需要更宽松的角度容差，或者需要多倒几次车

    # 【修改点 2】MPPI 控制器配置 (推荐用于舵轮/阿克曼)
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.01
      batch_size: 2000
      
      # 速度采样设置
      vx_std: 0.4       # X轴速度采样噪声
      vy_std: 0.0       # 【重要】Y轴速度采样噪声设为0，因为无法横向移动
      wz_std: 0.4       # 角速度采样噪声
      
      # 速度限制
      vx_min: -0.5      # 【建议】倒车速度不宜过快，舵轮倒车控制较难
      vx_max: 1.50
      vy_min: 0.0       # 【重要】最小Y速度 0
      vy_max: 0.0       # 【重要】最大Y速度 0
      wz_max: 1.0       # 最大角速度
      
      iteration_count: 1
      prune_distance: 0.4
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      
      # 【重要】运动模型修改
      motion_model: "Ackermann" # 设置为阿克曼模型
      
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      # 【重要】阿克曼约束
      AckermannConstraints:
        min_turning_r: 0.45 # 【关键参数】最小转弯半径(米)。
                            # 请务必根据您的舵轮/底盘机械结构测量此值！
                            # 设置过小会导致规划出无法执行的路径。

      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic", "ObstaclesCritic"]
      
      ConstraintCritic:
        enabled: true   # 【建议】启用约束评分，确保遵守转弯半径
        cost_power: 1
        cost_weight: 4.0
        
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
        
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false # 如果设置了 footprint，建议改为 true
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
        
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
        
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: true # 【建议】阿克曼模型建议参考路径朝向
        
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
        
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.05, 0.05, 0.05]

    # 【修改点 3】DWB 控制器配置 (作为备用，配置为差速模式)
    FollowPathDWB:
      plugin: "dwb_core::DWBLocalPlanner"
      prune_distance: 0.5
      debug_trajectory_details: True
      
      # 速度限制
      min_vel_x: 0.0    # DWB通常不擅长处理阿克曼倒车，建议设为0或很小
      min_vel_y: 0.0    # 【重要】Y轴速度 0
      max_vel_x: 0.5
      max_vel_y: 0.0    # 【重要】Y轴速度 0
      max_vel_theta: 1.0
      
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      
      acc_lim_x: 2.5
      acc_lim_y: 0.0    # 【重要】Y轴加速度 0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      
      vx_samples: 20
      vy_samples: 0     # 【重要】不采样Y轴速度
      vtheta_samples: 40
      
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.3 # 增加前瞻距离
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.3
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 0.0 # 舵轮无法原地旋转，必须禁用 RotateToGoal

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 50.0
      publish_frequency: 20.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      
      # 【修改点 4】机器人形状
      # 如果是长方形的舵轮AGV，建议使用 footprint 而不是 radius
      # footprint: "[[0.3, 0.2], [0.3, -0.2], [-0.3, -0.2], [-0.3, 0.2]]" # 示例：长0.6宽0.4
      robot_radius: 0.26 
      
      plugins: ["obstacle_layer", "inflation_layer", "laser_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.23
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: livox 
        max_obstacle_height: 1.0
        min_obstacle_height: -1.0
        livox:
          topic: /scan
          max_obstacle_height: 1.0
          min_obstacle_height: -1.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.5
          
      laser_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: laser 
        max_obstacle_height: 1.0
        min_obstacle_height: -1.0
        laser:
          topic: /ld_laserscan
          max_obstacle_height: 1.0
          min_obstacle_height: -1.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.5
          
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
      local_costmap_client:
        ros__parameters:
          use_sim_time: False
      local_costmap_rclcpp_node:
        ros__parameters:
          use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 20.0
      publish_frequency: 20.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      robot_radius: 0.26 # 全局规划也建议使用 footprint
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "stvl_layer", "inflation_layer", "obstacle_layer"]
      
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 0.5
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: true
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 0.2
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: livox_mark livox_clear 
        livox_mark:
          data_type: PointCloud2
          topic: /pointcloud
          marking: true
          clearing: false
          obstacle_range: 4.0
          min_obstacle_height: 0.2
          max_obstacle_height: 2.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true
        livox_clear:
          enabled: true
          data_type: PointCloud2
          topic: /pointcloud
          marking: false
          clearing: true
          max_z: 8.0
          min_z: 1.0
          vertical_fov_angle: 1.029
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 360.0
          decay_acceleration: 5.0
          model_type: 1
          
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 0
        scan:
          topic: /ld_laserscan
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: false
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.80
      always_send_full_costmap: True
      global_costmap_client:
        ros__parameters:
          use_sim_time: False
      global_costmap_rclcpp_node:
        ros__parameters:
          use_sim_time: False

map_server:
  ros__parameters :
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: True
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["SmoothPath"]

    SmoothPath:
      plugin: "nav2_constrained_smoother/ConstrainedSmoother"
      reversing_enabled: true
      path_downsampling_factor: 3
      path_upsampling_factor: 1
      keep_start_orientation: true
      keep_goal_orientation: true
      # 【修改点 5】平滑器最小转弯半径
      minimum_turning_radius: 0.45  # 【重要】必须设置，否则平滑后的路径可能包含无法执行的急转弯
      w_curve: 30.0
      w_dist: 0.0
      w_smooth: 2000000.0
      w_cost: 0.015
      w_cost_cusp_multiplier: 3.0
      cusp_zone_length: 2.5
      optimizer:
        max_iterations: 70
        debug_optimizer: false
        gradient_tol: 5.0e+3
        fn_tol: 1.0e-15
        param_tol: 1.0e-20

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin" # 注意：舵轮可能无法原地旋转，Spin行为可能需要禁用或谨慎使用
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.3
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0] # 【修改点 6】Y轴最大速度设为0
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [1.0, 0.0, 3.0]
    max_decel: [-1.0, 0.0, -3.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
