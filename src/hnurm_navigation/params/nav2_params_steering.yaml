amcl:
  ros__parameters:
    # 初始位姿参数
    # initial_pose:
    #   x: 0.0
    #   y: 0.0
    #   yaw: 0.0
    # set_initial_pose: true
    use_sim_time: False
    alpha1: 0.2     # 旋转运动产生的旋转噪声
    alpha2: 0.2     # 旋转运动产生的平移噪声
    alpha3: 0.2     # 平移运动产生的平移噪声
    alpha4: 0.2     # 平移运动产生的旋转噪声
    alpha5: 0.2     # 全向轮专用参数，对于舵轮/差速通常不生效或设为0
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 100
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.0
    resample_interval: 1
    # 【修改点 1】机器人运动模型
    # 舵轮/阿克曼机器人通常在定位算法中近似为差速模型 (DifferentialMotionModel)
    # 或者是 nav2_amcl::AckermannMotionModel (如果您的ROS2版本支持)
    robot_model_type: "nav2_amcl::DifferentialMotionModel" 
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

