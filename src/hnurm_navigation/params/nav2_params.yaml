amcl:
  ros__parameters:
    # 初始位姿参数（与地图原点一致）
    # initial_pose:
    #   x: 0.0   # 地图原点 x 坐标
    #   y: 0.0    # 地图原点 y 坐标
    #   yaw: 0.0    # 初始朝向（弧度）
    # set_initial_pose: true  # 启用初始位姿设置
    use_sim_time: False
    alpha1: 0.2     # 里程计旋转运动产生的旋转噪声
    alpha2: 0.2     # 里程计旋转运动产生的平移噪声
    alpha3: 0.2     # 里程计平移运动产生的平移噪声
    alpha4: 0.2     # 里程计平移运动产生的旋转噪声
    alpha5: 0.2     # 全向轮模型专用参数
    base_frame_id: "base_footprint" # 机器人基座坐标系
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"  # 全局坐标系
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0   #20.0 # 激光雷达最大有效距离
    laser_min_range: -1.0
    laser_model_type: "likelihood_field" # 激光雷达模型类型
    max_beams: 100
    max_particles: 2000     # 最大粒子数
    min_particles: 500      # 最小粒子数
    odom_frame_id: "odom"   # 里程计坐标系
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1   #0.0 # 快速恢复参数（用于应对定位丢失）
    recovery_alpha_slow: 0.0   # 慢速恢复参数
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel" # 机器人运动模型：全向轮
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true      # 是否发布 map -> odom 的 TF 变换
    transform_tolerance: 1.0
    update_min_a: 0.2       # 触发更新的最小旋转角度(弧度)
    update_min_d: 0.25      # 触发更新的最小移动距离(米)
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan        # 订阅的激光雷达话题

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
