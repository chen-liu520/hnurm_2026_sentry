bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:    #   lookahead_dist: 0.6

  ros__parameters:
    odom_topic: /Odometry_transformed
    use_sim_time: False
    controller_frequency: 100.0 # 控制器运行频率(Hz)
    min_x_velocity_threshold: 0.001 # X轴最小速度阈值(死区)
    min_y_velocity_threshold: 0.001 # Y轴最小速度阈值
    min_theta_velocity_threshold: 0.001 # 最小角速度阈值
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath","Omni", "Omni3"]
    enable_stamped_cmd_vel: true
    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5 # 必须移动的最小半径
      movement_time_allowance: 10.0 # 允许的时间，如果10秒内没移动0.5米则认为卡住
    # Goal checker parameters
    # precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1    # 到达目标的XY位置容差(米)
      yaw_goal_tolerance: 3.15  # 到达目标的角度容差(弧度)
      
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56    # 预测的时间步数
      model_dt: 0.01    # 每个时间步的时间间隔(秒)，总预测时间 = time_steps * model_dt
      batch_size: 2000  # 每次迭代采样的轨迹数量，越多越精确但越耗算力
      vx_std: 0.3       # X轴速度采样标准差（探索范围）
      vy_std: 0.3       # Y轴速度采样标准差
      wz_std: 0.4       # 角速度采样标准差 #调大这个以适配云台旋转
      vx_min: -1.30     # 最小X速度
      vx_max: 1.30      # 最大X速度
      vy_min: -1.30     # 最小Y速度
      vy_max: 1.30      # 最大Y速度
      wz_max: 1.50      # 最大角速度
      iteration_count: 1
      prune_distance: 0.4
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni" # 运动模型：全向
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
        # prediction_horizon_s * max_speed / path_resolution / 3.0  is a good baseline
      # critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic","ObstaclesCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      # GoalAngleCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 3.0
      #   threshold_to_consider: 0.5
      # PreferForwardCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 5.0
      #   threshold_to_consider: 0.5
      # Option to replace Cost and use Obstacles instead
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      # PathAngleCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 2.0
      #   offset_from_furthest: 4
      #   threshold_to_consider: 0.5
      #   max_angle_to_furthest: 1.0
      #   forward_preference: true
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0
    FollowPath2:
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # primary_controller: "dwb_core::DWBLocalPlanner"
      # angular_dist_threshold: 0.785
      # forward_sampling_distance: 0.5
      # rotate_to_heading_angular_vel: 1.8
      # max_angular_accel: 3.2
      # simulate_ahead_time: 1.0
      
      plugin: "dwb_core::DWBLocalPlanner"
      prune_distance: 0.5    # 剪枝距离：机器人走过后，身后多少距离的路径点会被删除
      debug_trajectory_details: True # 调试模式：发布评分细节
      min_vel_x: -0.25
      min_vel_y: -0.25
      max_vel_x: 0.25
      max_vel_y: 0.25
      max_vel_theta: 0.0  
      min_speed_xy: -2.0
      max_speed_xy: 2.0
      min_speed_theta: 0.0
      # Add high threshold velocity for turtlebot 3 issue.
      # https://github.com/ROBOTIS-GIT/turtlebot3_simulations/issues/75
      acc_lim_x: 3.0    # X轴加速度限制
      acc_lim_y: 3.0    # Y轴加速度限制
      acc_lim_theta: 3.2 # 角加速度限制
      decel_lim_x: -3.0 # X轴减速度限制
      decel_lim_y: -3.0 
      decel_lim_theta: -3.2
      vx_samples: 40    # X速度采样数，越大越平滑但越卡
      vy_samples: 40    # Y速度采样数
      vtheta_samples: 0
      sim_time: 1.7     # 模拟时间(秒)：预测未来多少秒的轨迹
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      # critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist",]
      critics: ["Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist",]

      BaseObstacle.scale: 0.2 # 避障评分权重：越高越怕撞
      BaseObstacle.sum_scores: True      #提高避障评分
      PathAlign.scale: 64.0   # 路径对齐权重：越高越贴合全局路径
      PathAlign.forward_point_distance: 0.1   #0.1
      GoalAlign.scale: 24.0   # 目标对齐权重：越高车头越指向目标
      GoalAlign.forward_point_distance: 0.1     #0.1
      PathDist.scale: 32.0    # 路径距离权重：越高越不敢偏离路径
      GoalDist.scale: 24.0    # 目标距离权重：越高越想接近目标
      # RotateToGoal.scale: 32.0
      # RotateToGoal.slowing_factor: 5.0
      # RotateToGoal.lookahead_time: -1.0
      RotateToGoal.scale: 0.0
      RotateToGoal.slowing_factor: 0.0
      RotateToGoal.lookahead_time: 0.0
      # Recovery
      shrink_horizon_backup: True
      shrink_horizon_min_duration: 10.0
      oscillation_recovery: True
      oscillation_v_eps: 0.2   #0.1X下同
      oscillation_omega_eps: 0.2
      oscillation_recovery_min_duration: 5.0   #10.0 下同
      oscillation_filter_duration: 5.0
    Omni:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.01
      batch_size: 2000
      vx_std: 0.35
      vy_std: 0.35
      wz_std: 2.0   #调大这个以适配云台旋转
      vx_min: -1.5
      vx_max: 1.5
      vy_min: -1.5
      vy_max: 1.5
      wz_max: 2.0
      iteration_count: 1
      prune_distance: 0.5
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      # critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic","ObstaclesCritic"]
      ConstraintCritic:
        enabled: false   #这个对于旋转扫描走有副作用
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      # GoalAngleCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 3.0
      #   threshold_to_consider: 0.5
      # PreferForwardCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 5.0
      #   threshold_to_consider: 0.5
      # Option to replace Cost and use Obstacles instead
      ObstaclesCritic:
        enabled: false
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0
        offset_from_furthest: 5
        threshold_to_consider: 0.8
      # PathAngleCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 2.0
      #   offset_from_furthest: 4
      #   threshold_to_consider: 0.5
      #   max_angle_to_furthest: 1.0
      #   forward_preference: true
      # VelocityDeadbandCritic:
      #   enabled: true
      #   cost_power: 1
      #   cost_weight: 35.0
      #   deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0
    Omni3:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.01
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 2.0   #调大这个以适配云台旋转
      vx_min: -0.2
      vx_max: 0.2
      vy_min: -0.2
      vy_max: 0.2
      wz_max: 10.0
      iteration_count: 1
      prune_distance: 0.5
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      # critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic","ObstaclesCritic"]
      ConstraintCritic:
        enabled: false   #这个对于旋转扫描走有副作用
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.8
      # GoalAngleCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 3.0
      #   threshold_to_consider: 0.5
      # PreferForwardCritic:
      #   enabled: false
      #   cost_power: 1
      #   cost_weight: 5.0
      #   threshold_to_consider: 0.5
      # Option to replace Cost and use Obstacles instead
      ObstaclesCritic:
        enabled: false
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.3
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
